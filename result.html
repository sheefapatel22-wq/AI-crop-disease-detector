<!DOCTYPE html>
<html>
<head>
<title>Analysis Report</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link rel="stylesheet" href="/static/style.css">
</head>
<body class="bg">

<div class="container py-4">
    <h2 class="title text-center mb-4">📊 Crop Health Analysis Dashboard</h2>

    <div class="row">
        <div class="col-md-5">
            <div class="card shadow">
                <img src="/{{image_path}}" class="img-fluid rounded">
            </div>
        </div>

        <div class="col-md-7">
            <div class="card p-3 shadow">
                <h3>Disease: <span class="badge bg-{{badge}}">{{disease}}</span></h3>
                <p><strong>Severity:</strong> {{severity}}</p>
                <p><strong>Confidence:</strong> {{confidence}}%</p>

                <div class="progress mb-3" style="height:25px">
                    <div class="progress-bar bg-success" style="width: {{confidence}}%">{{confidence}}%</div>
                </div>

                <h5>Recommended Actions</h5>
                <ul>
                {% for t in tips %}
                    <li>{{t}}</li>
                {% endfor %}
                </ul>
            </div>
        </div>
    </div>

    <div class="card mt-4 p-3 shadow">
        <h4>📈 Leaf Analytics</h4>
        <canvas id="chart"></canvas>
    </div>
</div>

<script>
const ctx=document.getElementById('chart');
new Chart(ctx,{
 type:'bar',
 data:{
  labels:["Green","Yellow","Brown","Dark"],
  datasets:[{label:"Color Distribution %",data:[{{stats['Green']}},{{stats['Yellow']}},{{stats['Brown']}},{{stats['Dark']}}]}]
 }
});
</script>

</body>
</html>
